name: ETL

on:
  schedule:
    # Daily 06:00 UTC = 01:00 Dallas (CST) / 02:00 (CDT) — before market opens
    - cron: "0 6 * * *"
    # Weekly Sunday 06:30 UTC — extra slot for sold + DCAD + scorecards
    - cron: "30 6 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "daily | weekly | manual"
        required: false
        default: "manual"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.mode.outputs.mode }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 6 * * 0" ]; then
            echo "mode=weekly" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape active listings (Redfin)
        run: python -m scrapers.redfin --status active

      - name: Score watchlist
        run: python -m pipeline.score

      - name: Scrape sold comps (weekly only)
        if: steps.mode.outputs.mode == 'weekly' || steps.mode.outputs.mode == 'manual'
        run: python -m scrapers.redfin --status sold --rate-seconds 6

      - name: Refresh DCAD parcels (weekly only)
        if: steps.mode.outputs.mode == 'weekly' || steps.mode.outputs.mode == 'manual'
        continue-on-error: true
        run: python -m scrapers.dcad

      - name: Build sub-area scorecards
        run: python -m pipeline.aggregate

      - name: Commit data snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "data: refresh ${{ steps.mode.outputs.mode }} run $(date -u +%Y-%m-%d)"
          git push

  build-and-deploy:
    needs: etl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci || npm install
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
